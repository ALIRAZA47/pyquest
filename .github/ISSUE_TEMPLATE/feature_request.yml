name: 💡 Feature or content request
description: Suggest a new feature, lesson, course, or improvement
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature, lesson, or improvement — and the problem it solves for learners.
      placeholder: A live web playground where learners can experiment freely, like the Python playground…
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Type of request
      options:
        - New lesson / content
        - New course
        - New challenge type or visualizer
        - Gamification
        - UX / accessibility / performance
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details / examples (optional)
      description: Sketches, links, or examples from other apps are welcome.
