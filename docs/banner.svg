<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-label="Quest — learn to code, beautifully">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c16"/>
      <stop offset="1" stop-color="#12152a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#6366f1" fill-opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#dots)"/>
  <ellipse cx="640" cy="150" rx="560" ry="220" fill="url(#glow)"/>

  <!-- logo mark -->
  <g transform="translate(508 74)">
    <rect x="0" y="0" width="72" height="72" rx="20" fill="url(#brand)"/>
    <path d="M26 26 L16 36 L26 46 M46 26 L56 36 L46 46" fill="none" stroke="#0a0c16" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="640" y="238" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="132" font-weight="800" letter-spacing="-4" fill="url(#brand)">Quest</text>

  <!-- tagline -->
  <text x="640" y="290" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="27" font-weight="600" fill="#e7eaf6">Learn to code, beautifully.</text>
  <text x="640" y="322" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="0.5" fill="#979fba">Nine interactive courses · runnable code · gamified progress</text>

  <!-- course pills -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
    <g transform="translate(61 360)"><rect width="118" height="40" rx="20" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.55"/><text x="59" y="26" fill="#a5abf6">Python</text></g>
    <g transform="translate(191 360)"><rect width="118" height="40" rx="20" fill="#0d9488" fill-opacity="0.15" stroke="#0d9488" stroke-opacity="0.55"/><text x="59" y="26" fill="#2dd4bf">ML</text></g>
    <g transform="translate(321 360)"><rect width="118" height="40" rx="20" fill="#9333ea" fill-opacity="0.15" stroke="#9333ea" stroke-opacity="0.55"/><text x="59" y="26" fill="#c084fc">AI</text></g>
    <g transform="translate(451 360)"><rect width="118" height="40" rx="20" fill="#ea580c" fill-opacity="0.15" stroke="#ea580c" stroke-opacity="0.55"/><text x="59" y="26" fill="#fb923c">HTML</text></g>
    <g transform="translate(581 360)"><rect width="118" height="40" rx="20" fill="#2563eb" fill-opacity="0.15" stroke="#2563eb" stroke-opacity="0.55"/><text x="59" y="26" fill="#60a5fa">CSS</text></g>
    <g transform="translate(711 360)"><rect width="118" height="40" rx="20" fill="#d97706" fill-opacity="0.15" stroke="#d97706" stroke-opacity="0.55"/><text x="59" y="26" fill="#fbbf24">JavaScript</text></g>
    <g transform="translate(841 360)"><rect width="118" height="40" rx="20" fill="#0891b2" fill-opacity="0.15" stroke="#0891b2" stroke-opacity="0.55"/><text x="59" y="26" fill="#22d3ee">TypeScript</text></g>
    <g transform="translate(971 360)"><rect width="118" height="40" rx="20" fill="#e11d48" fill-opacity="0.15" stroke="#e11d48" stroke-opacity="0.55"/><text x="59" y="26" fill="#fb7185">React</text></g>
    <g transform="translate(1101 360)"><rect width="118" height="40" rx="20" fill="#16a34a" fill-opacity="0.15" stroke="#16a34a" stroke-opacity="0.55"/><text x="59" y="26" fill="#4ade80">Node.js</text></g>
  </g>
</svg>
